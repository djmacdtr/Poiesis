# docker-compose.dev.yml
# 开发者本地构建路径（覆盖默认的镜像拉取）
#
# 使用方式：
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
