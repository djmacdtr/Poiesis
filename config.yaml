llm:
  provider: "openai"
  model: "gpt-4o"
  temperature: 0.8
  max_tokens: 4000

planner_llm:
  provider: "openai"
  model: "gpt-4o"
  temperature: 0.3
  max_tokens: 2000

similarity:
  originality_threshold: 0.85
  fact_retrieval_k: 10
  chapter_similarity_k: 5

generation:
  max_chapters: 100
  rewrite_retries: 3
  new_rule_budget: 5
  target_word_count: 3000

database:
  path: "poiesis.db"

vector_store:
  path: "vector_store"
  embedding_model: "all-MiniLM-L6-v2"

world_seed: "examples/world_seed.yaml"
