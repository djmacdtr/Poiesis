# docker-compose.yml
# Poiesis 一键部署：后端 API + 前端 Nginx + （可选）Embedding Service
#
# ── 部署模式 ──────────────────────────────────────────────────
#   轻量模式（默认）：api + web
#     docker compose up -d
#     • API 镜像约 500MB（无 PyTorch / sentence-transformers）
#     • embedding 使用确定性哈希向量（本地 dummy），无语义相似度
#
#   完整模式（含真实 embedding）：api + web + embed
#     docker compose --profile full up -d
#     • 额外启动 poiesis-embed 容器（约 3GB，含 sentence-transformers + PyTorch）
#     • api 自动通过 HTTP 调用 poiesis-embed 获取语义向量
#     • 首次启动会下载模型，后续通过 volume 缓存加速
#
# ── 镜像体积说明 ──────────────────────────────────────────────
#   poiesis-api 镜像 ：约 500MB（不含 PyTorch / sentence-transformers）
#   poiesis-web 镜像 ：约  50MB（nginx:alpine）
#   poiesis-embed 镜像：约  3GB（含 sentence-transformers + PyTorch）
#   轻量模式合计      ：约 550MB（相比旧版节省约 87%）
#
# ── 端口说明（适配服务器已有 Nginx 反代场景）──────────────────
#   - web   服务监听 127.0.0.1:18080（前端静态文件 + 内部 /api 反代）
#   - api   服务监听 127.0.0.1:18000（后端 FastAPI，供本地调试）
#   - embed 服务仅在内部网络暴露，不对宿主机绑定端口
#   - web/api 均只绑定本机回环地址，由服务器已有 Nginx 做外部反代
#
# ── 快速开始 ──────────────────────────────────────────────────
#   1. 复制 .env.example 为 .env，填入 API Key 与 POIESIS_SECRET_KEY
#   2. mkdir -p data
#   3. docker compose up -d                    # 轻量模式
#      docker compose --profile full up -d    # 完整模式（含 embed）
#   4. 配置服务器 Nginx 反代到 127.0.0.1:18080
#
# 开发者本地构建：docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  # ── 后端 API 服务 ────────────────────────────────────────────
  api:
    image: ghcr.io/djmacdtr/poiesis-api:${POIESIS_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      # LLM 密钥（从 .env 文件读取，不写入镜像）
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Embedding 提供者：local（默认，离线哈希）/ remote（调用 poiesis-embed 服务）
      # 完整模式下设为 remote（docker compose --profile full 会自动设置）
      - POIESIS_EMBEDDING_PROVIDER=${POIESIS_EMBEDDING_PROVIDER:-local}
      # Embedding Service 地址（remote 模式时使用，指向 poiesis-embed 容器）
      - POIESIS_EMBEDDING_URL=${POIESIS_EMBEDDING_URL:-http://embed:9000}
      # 配置文件路径（容器内）
      - POIESIS_CONFIG=/app/config.yaml
      # 加密与 JWT 签名密钥（生产必填；留空则使用内置默认密钥并打印警告）
      - POIESIS_SECRET_KEY=${POIESIS_SECRET_KEY:-}
      # 首次启动自动创建的管理员账号（不存在时生效）
      - POIESIS_ADMIN_USER=${POIESIS_ADMIN_USER:-admin}
      - POIESIS_ADMIN_PASS=${POIESIS_ADMIN_PASS:-admin}
    volumes:
      # 持久化数据目录（含 poiesis.db 和 vector_store/）
      - ./data:/app/data
      # Docker 专用配置（只读）
      - ./docker/config.yaml:/app/config.yaml:ro
      # 世界种子文件（init 时使用）
      - ./examples:/app/examples:ro
    ports:
      # 绑定本机回环地址，不对公网暴露；供本地调试或服务器 Nginx 直接反代 API
      - "127.0.0.1:18000:8000"
    networks:
      - poiesis_net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request, sys; \
              r = urllib.request.urlopen('http://localhost:8000/health', timeout=5); \
              sys.exit(0 if r.status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── 前端 Nginx 服务 ──────────────────────────────────────────
  web:
    image: ghcr.io/djmacdtr/poiesis-web:${POIESIS_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      # 绑定本机回环地址，不对公网直接暴露；由服务器 Nginx 反代到此端口
      - "127.0.0.1:18080:80"
    networks:
      - poiesis_net
    depends_on:
      api:
        condition: service_healthy

  # ── Embedding Service（完整模式，--profile full 时启动）──────
  # 提供真实语义向量（sentence-transformers + PyTorch）
  # 启动方式：docker compose --profile full up -d
  embed:
    image: ghcr.io/djmacdtr/poiesis-embed:${POIESIS_IMAGE_TAG:-latest}
    profiles:
      - full
    restart: unless-stopped
    environment:
      # 使用的 embedding 模型（首次启动会下载，后续从 volume 缓存加载）
      - POIESIS_EMBEDDING_MODEL=${POIESIS_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      # 模型缓存目录（映射到下方 volume，避免每次重新下载）
      - SENTENCE_TRANSFORMERS_HOME=/app/model_cache
    volumes:
      # 持久化模型缓存（避免每次重启重新下载，约 90MB）
      - embed_model_cache:/app/model_cache
    # embed 服务仅在内部网络暴露，不绑定宿主机端口
    networks:
      - poiesis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  poiesis_net:
    driver: bridge

volumes:
  # Embedding 模型缓存（完整模式使用）
  embed_model_cache:
