# Nginx 配置：托管前端静态文件并将 /api 反向代理到后端服务
# - /        → 前端静态文件（SPA 路由兜底到 /index.html）
# - /api/*   → 反代到后端 http://api:8000（docker compose 服务名）

server {
    listen 80;
    server_name _;

    # 前端静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # /api 反向代理到后端
    location /api/ {
        proxy_pass         http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE 实时日志流需要关闭缓冲
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # 健康检查端点直接反代
    location /health {
        proxy_pass         http://api:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # OpenAPI 文档端点反代（供开发者通过 Web 代理访问 API 文档）
    location /openapi.json {
        proxy_pass         http://api:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /docs {
        proxy_pass         http://api:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /redoc {
        proxy_pass         http://api:8000/redoc;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # SPA 路由：非文件路径回退到 /index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
