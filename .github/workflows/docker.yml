name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/poiesis-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/poiesis-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── API 镜像元数据 ───────────────────────────────────────
      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Web 镜像元数据 ───────────────────────────────────────
      - name: Extract metadata for Web image
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 构建并推送 API 镜像 ──────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 构建并推送 Web 镜像 ──────────────────────────────────
      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image locally for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          load: true
          tags: poiesis-api:smoke
          cache-from: type=gha

      - name: Smoke test — API health check
        run: |
          docker run --rm \
            -e POIESIS_EMBEDDING_MODE=dummy \
            -e POIESIS_SECRET_KEY=smoketest-key-32-bytes-padded-xx \
            -e POIESIS_ADMIN_USER=admin \
            -e POIESIS_ADMIN_PASS=admin \
            -p 18000:8000 \
            --detach \
            --name poiesis-smoke \
            poiesis-api:smoke
          echo "Waiting for API to start..."
          healthy=false
          for attempt in $(seq 1 15); do
            if docker exec poiesis-smoke python -c \
              "import urllib.request, sys; r = urllib.request.urlopen('http://localhost:8000/health', timeout=5); sys.exit(0 if r.status == 200 else 1)" \
              2>/dev/null; then
              echo "API is healthy after attempt ${attempt}"
              healthy=true
              break
            fi
            sleep 2
          done
          if [ "$healthy" != "true" ]; then
            echo "ERROR: API failed to become healthy after 15 attempts"
            docker logs poiesis-smoke
            docker stop poiesis-smoke
            exit 1
          fi
          curl -f http://127.0.0.1:18000/health
          curl -f http://127.0.0.1:18000/api/openapi.json
          docker stop poiesis-smoke
