world:
  name: "裂隙纪元"
  genre: "黑暗奇幻"
  setting: >
    远古灾变“大崩裂”之后，世界被撕成漂浮于幽光迷雾中的群岛大陆。
    魔法既令人渴望又令人恐惧，因为每一次施法都要以生命力为代价。

immutable_rules:
  - key: "magic_costs_life"
    description: "施法必定消耗施法者的生命力。小型法术会削弱体能，大型术式可能导致衰老甚至死亡。"
    is_immutable: true
    category: "magic"

  - key: "dead_stay_dead"
    description: "死者不可复生。死灵术只能驱动无魂躯壳，灵魂在死亡时即永久离去。"
    is_immutable: true
    category: "metaphysics"

  - key: "shards_repel_magic"
    description: "裂晶铁会吸收并抵消奥术能量，在十英尺范围内形成稳定反魔区。"
    is_immutable: true
    category: "magic"

characters:
  - name: "艾琳德拉·沃斯"
    description: "年近三十的女法师，白霜般的短发与灼痕遍布的双手格外醒目。她行事克制，寡言少语，言辞却极有分量。"
    core_motivation: "为十八岁时误用禁术焚毁故乡凯尔维斯而赎罪。"
    attributes:
      age: 28
      abilities:
        - "火系魔法（受压制）"
        - "有限心灵感应"
        - "符文刻写"
      faction: "无（曾属于余烬誓约）"
      status: "active"

  - name: "苍白审判官·多尔凡"
    description: "裂晶教会审判官，身形高瘦，灰白瞳孔深陷，常以裂晶铁镣束缚自身。信仰极端，几乎不留怜悯。"
    core_motivation: "肃清失控魔法，阻止第二次大崩裂。"
    attributes:
      age: 52
      abilities:
        - "裂晶铁抗性"
        - "战术统御"
        - "教会法权"
      faction: "裂晶教会"
      status: "active"

  - name: "米拉·塔维克"
    description: "漂城卡拉斯底层长大的少女拾荒者，手脚麻利、头脑灵活，常年沾着机油，却比同龄人读过更多书。"
    core_motivation: "找回并救出五年前因魔法失控而被教会带走的兄长埃斯滕。"
    attributes:
      age: 17
      abilities:
        - "机械修复"
        - "潜行与扒窃"
        - "潜伏中的魔法天赋"
      faction: "无"
      status: "active"

timeline_events:
  - event_key: "great_shattering"
    description: "三百年前，法师议会试图引导原初之焰终结百年战争，却引发世界断裂，形成漂浮群岛。"
    timestamp_in_world: "裂隙历 0 年"

  - event_key: "caelweth_destruction"
    description: "凯尔维斯村在失控火术中被焚毁，六十三人遇难，唯一幸存者为年轻法师艾琳德拉。"
    timestamp_in_world: "裂隙历 290 年"
    characters_involved:
      - "艾琳德拉·沃斯"

  - event_key: "esten_talvec_taken"
    description: "埃斯滕·塔维克在卡拉斯集市失控引雷，审判官多尔凡率队迅速介入并将其押往寂灭尖塔。"
    timestamp_in_world: "裂隙历 295 年"
    characters_involved:
      - "苍白审判官·多尔凡"
      - "米拉·塔维克"

foreshadowing:
  - hint_key: "ancient_artifact"
    description: "传闻“大织石”埋于裂晶教会主教座堂地基之下，既可能修复世界裂隙，也可能引发第二次崩裂。"
    status: "pending"

  - hint_key: "mira_latent_power"
    description: "米拉曾两次在必死局面中幸存，现场都出现短暂银辉，却无人能解释其来源。"
    status: "pending"

  - hint_key: "dorvaan_doubt"
    description: "多尔凡有一本上锁手记，破损封页上写着：‘若异端其实是我？’"
    status: "pending"
